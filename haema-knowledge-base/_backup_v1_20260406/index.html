<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAEMA | 사내 관리규정 검색</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ====== 메인 카드 ====== -->
  <div class="main-card">

    <!-- 로고 -->
    <div class="logo-area">
      <div class="logo-text">HAEMA</div>
      <div class="logo-sub">ARCHITECTS</div>
    </div>

    <!-- 프로그레스 바 (문서 등록 현황) -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">등록 문서</span>
        <span class="progress-count" id="docCount">0개</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
      </div>
    </div>

    <!-- ====== 채팅 뷰 ====== -->
    <div class="chat-view" id="chatView">

      <!-- 제목/설명 -->
      <h2 class="section-title">사내 관리규정 검색</h2>
      <p class="section-desc">사내 규정 및 매뉴얼에서 필요한 정보를 AI가 정리해드립니다.</p>

      <!-- 채팅 영역 -->
      <div class="chat-area" id="chatArea">
        <div class="chat-empty" id="chatEmpty">
          <span class="chat-empty-icon">📖</span>
          <span>궁금한 점을 질문해 보세요.</span>
        </div>
      </div>

      <!-- 입력 영역 -->
      <div class="input-section">
        <label class="input-label" for="questionInput">질문 입력</label>
        <div class="input-wrapper">
          <span class="input-icon">🔍</span>
          <input
            type="text"
            class="input-field"
            id="questionInput"
            placeholder="궁금한 점을 질문해 보세요..."
            autocomplete="off"
          >
        </div>
        <button class="btn-primary" id="sendBtn" onclick="sendQuestion()">
          검색하기
          <span class="btn-arrow">›</span>
        </button>
      </div>

      <!-- 하단 링크 (새 대화 + 문서 관리) -->
      <div class="bottom-links">
        <button class="link-secondary" onclick="resetChat()">새 대화</button>
        <button class="link-secondary" onclick="showDocsView()">문서 관리</button>
      </div>
    </div>

    <!-- ====== 문서 관리 뷰 ====== -->
    <div class="docs-view" id="docsView">

      <!-- 제목/설명 -->
      <h2 class="section-title">문서 관리</h2>
      <p class="section-desc">등록된 문서 목록입니다.</p>

      <!-- 문서 리스트 -->
      <div class="doc-list" id="docList">
        <div class="doc-empty" id="docEmpty">등록된 문서가 없습니다.</div>
      </div>

      <!-- 파일 업로드 영역 -->
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-area-icon">📄</div>
        <div class="upload-area-text">클릭하여 문서 파일을 선택하세요</div>
        <div class="upload-area-hint">PDF, HWP, DOCX, XLSX, PPTX 등 (100MB 이하)</div>
      </div>
      <input type="file" class="file-input-hidden" id="fileInput" accept=".pdf,.hwp,.doc,.docx,.xlsx,.xls,.pptx,.txt,.csv,.md" onchange="uploadFile(this)">

      <!-- 업로드 상태 메시지 -->
      <div class="upload-status" id="uploadStatus"></div>

      <!-- 파일 업로드 버튼 -->
      <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
        + 파일 업로드
        <span class="btn-arrow">›</span>
      </button>

      <!-- 채팅으로 돌아가기 링크 -->
      <button class="link-secondary" onclick="showChatView()">채팅으로 돌아가기</button>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
